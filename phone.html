<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AruCo Phone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .video-wrapper {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: black;
      display: block;
    }

    video {
      display: none;
    }
  </style>
</head>
<body>
  <h1>iPhone Sender</h1>

  <div class="panel">
    <p>
      Diese Seite nutzt die Kamera, erkennt ArUco-Marker, berechnet die Pose
      und sendet die Werte live an den Viewer.
    </p>

    <div class="button-row">
      <button id="startCameraBtn">Kamera starten</button>
      <button id="stopCameraBtn">Kamera stoppen</button>
    </div>

    <p id="status">Status: bereit</p>
    <p class="small">
      In diesem Schritt werden echte Pose-Daten an den WebSocket-Server gesendet.
    </p>

    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/posit1.js"></script>

  <script>
    /******************************************************************
     * 1) EINSTELLBARE PARAMETER
     ******************************************************************/
    const MARKER_SIZE = 0.10; // 10 cm

    // HIER DEINE ECHTE WSS-ADRESSE EINTRAGEN
     const WS_URL = "wss://scaling-chainsaw-x5g5r9gj575pfppwq-8080.app.github.dev/";

    /******************************************************************
     * 2) HTML-ELEMENTE
     ******************************************************************/
    const startCameraBtn = document.getElementById("startCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    /******************************************************************
     * 3) GLOBALE VARIABLEN
     ******************************************************************/
    let stream = null;
    let animationId = null;
    let posit = null;
    let ws = null;

    const detector = new AR.Detector({
      dictionaryName: "ARUCO"
    });

    /******************************************************************
     * 4) WEBSOCKET VERBINDUNG
     * ---------------------------------------------------------------
     * Diese Verbindung schickt später die Pose an den Server.
     ******************************************************************/
    function connectSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log("WebSocket verbunden");
      };

      ws.onerror = (err) => {
        console.error("WebSocket Fehler:", err);
      };

      ws.onclose = () => {
        console.log("WebSocket getrennt");
      };
    }

    /******************************************************************
     * 5) MARKER ZEICHNEN
     ******************************************************************/
    function drawMarkers(markers) {
      for (const marker of markers) {
        const corners = marker.corners;

        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);

        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }

        ctx.closePath();
        ctx.stroke();

        // Ecke 0 markieren
        ctx.fillStyle = "#00ff00";
        ctx.beginPath();
        ctx.arc(corners[0].x, corners[0].y, 5, 0, Math.PI * 2);
        ctx.fill();

        // ID anzeigen
        ctx.fillStyle = "#ff0000";
        ctx.font = "20px Arial";
        ctx.fillText("ID: " + marker.id, corners[0].x, corners[0].y - 10);
      }
    }

    /******************************************************************
     * 6) POSE-TEXT ZEICHNEN
     ******************************************************************/
    function drawPoseText(translation) {
      ctx.fillStyle = "yellow";
      ctx.font = "20px Arial";

      ctx.fillText(`X: ${translation[0].toFixed(2)}`, 10, 30);
      ctx.fillText(`Y: ${translation[1].toFixed(2)}`, 10, 60);
      ctx.fillText(`Z: ${translation[2].toFixed(2)}`, 10, 90);
    }

    /******************************************************************
     * 7) ECKEN FÜR POSIT KONVERTIEREN
     ******************************************************************/
    function convertCornersForPosit(corners) {
      return corners.map(corner => ({
        x: corner.x - canvas.width / 2,
        y: canvas.height / 2 - corner.y
      }));
    }

    /******************************************************************
     * 8) POSE AUS ERSTEM MARKER BERECHNEN
     ******************************************************************/
    function estimatePoseFromFirstMarker(markers) {
      if (!markers || markers.length === 0 || !posit) {
        return null;
      }

      const marker = markers[0];
      const positCorners = convertCornersForPosit(marker.corners);
      const pose = posit.pose(positCorners);

      if (!pose || !pose.bestTranslation) {
        return null;
      }

      return {
        id: marker.id,
        translation: pose.bestTranslation,
        rotation: pose.bestRotation
      };
    }

    /******************************************************************
     * 9) WERTE AN DEN SERVER SENDEN
     * ---------------------------------------------------------------
     * Wir senden erstmal:
     * - x
     * - y
     * - z
     *
     * yaw / pitch / roll bleiben vorerst 0.
     *
     * Zusätzlich drehen wir das Vorzeichen / die Achsen etwas um,
     * damit es im Viewer natürlicher wirkt.
     ******************************************************************/
    /******************************************************************
 * WERTE AN DEN VIEWER SENDEN
 * ---------------------------------------------------------------
 * Die Rohwerte aus POSIT sind für unseren virtuellen Raum
 * noch nicht direkt passend.
 *
 * Deshalb:
 * - X wird stärker skaliert
 * - Y wird auf sinnvolle Raumhöhe gelegt
 * - Z bekommt einen Offset, damit die Kamera sichtbar vor der Wand steht
 ******************************************************************/
function sendPoseToViewer(translation) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    return;
  }

  // Rohwerte aus POSIT
  const rawX = translation[0];
  const rawY = translation[1];
  const rawZ = translation[2];

  // Für den Viewer sichtbarer umrechnen:
  // X: seitliche Bewegung stärker verstärken
  const viewerX = 1.0 + rawX / 5;

  // Y: ungefähr auf Augen-/Handyhöhe im Raum zentrieren
  const viewerY = 1.2 - rawY / 20;

  // Z: Abstand zur Wand, mit Offset damit die Kamera nicht "an der Wand klebt"
  const viewerZ = 0.8 + rawZ / 20;

  const posePayload = {
    x: viewerX,
    y: viewerY,
    z: viewerZ,
    yaw: 0,
    pitch: 0,
    roll: 0
  };

  ws.send(JSON.stringify({
    type: "pose",
    data: posePayload
  }));
}
    /******************************************************************
     * 10) RENDER-SCHLEIFE
     ******************************************************************/
    function renderFrame() {
      if (video.readyState >= 2) {
        // Canvas an Videogröße anpassen
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          // POSIT initialisieren, sobald Breite bekannt ist
          posit = new POS.Posit(MARKER_SIZE, canvas.width);
        }

        // Kamerabild zeichnen
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Bilddaten holen
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // Marker erkennen
        const markers = detector.detect(imageData);

        // Marker zeichnen
        drawMarkers(markers);

        // Pose berechnen
        const poseResult = estimatePoseFromFirstMarker(markers);

        if (poseResult) {
          drawPoseText(poseResult.translation);
          sendPoseToViewer(poseResult.translation);

          statusEl.textContent =
            `Status: Kamera läuft – ${markers.length} Marker erkannt – Pose wird gesendet`;
        } else {
          statusEl.textContent =
            `Status: Kamera läuft – ${markers.length} Marker erkannt`;
        }
      }

      animationId = requestAnimationFrame(renderFrame);
    }

    /******************************************************************
     * 11) KAMERA STARTEN
     ******************************************************************/
    async function startCamera() {
      try {
        statusEl.textContent = "Status: Kamera wird gestartet...";

        // WebSocket aufbauen
        if (!ws || ws.readyState > 1) {
          connectSocket();
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        statusEl.textContent = "Status: Kamera läuft";
        renderFrame();

      } catch (error) {
        console.error("Fehler beim Starten der Kamera:", error);
        statusEl.textContent = "Status: Kamerafehler";
      }
    }

    /******************************************************************
     * 12) KAMERA STOPPEN
     ******************************************************************/
    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      statusEl.textContent = "Status: Kamera gestoppt";
    }

    /******************************************************************
     * 13) BUTTONS
     ******************************************************************/
    startCameraBtn.addEventListener("click", startCamera);
    stopCameraBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
