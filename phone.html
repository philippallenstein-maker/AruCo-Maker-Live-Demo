<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AruCo Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .video-wrapper {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: black;
      display: block;
    }

    video {
      display: none;
    }
  </style>
</head>
<body>
  <h1>AruCo Live Demo</h1>

  <div class="panel">
    <p>
      Diese Demo zeigt stabil:
      Marker-Erkennung, ID, Orientierung und Achsen direkt am Marker.
    </p>

    <div class="button-row">
      <button id="startCameraBtn">Kamera starten</button>
      <button id="stopCameraBtn">Kamera stoppen</button>
    </div>

    <p id="status">Status: bereit</p>
    <p class="small">
      Oben links siehst du die erkannte Marker-ID und eine grobe Distanzschätzung.
      Direkt am Marker werden die X-, Y- und Z-Achsen eingezeichnet.
    </p>

    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/posit1.js"></script>

  <script>
    /******************************************************************
     * 1) EINSTELLBARE PARAMETER
     ******************************************************************/

    // Reale Markergröße in Metern
    const MARKER_SIZE = 0.10; // 10 cm

    // Näherungswert für Distanzschätzung aus Markergröße im Bild
    // Wenn Distanz zu klein angezeigt wird -> Wert erhöhen
    // Wenn Distanz zu groß angezeigt wird -> Wert senken
    const FOCAL_LENGTH_PX = 1400;

    // Länge der gezeichneten Achsen am Marker
    const AXIS_LENGTH_METERS = 0.06;

    // Nur jedes 2. Frame neu erkennen -> ruhiger
    const DETECTION_EVERY_N_FRAMES = 2;

    /******************************************************************
     * 2) HTML-ELEMENTE
     ******************************************************************/
    const startCameraBtn = document.getElementById("startCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    /******************************************************************
     * 3) GLOBALE VARIABLEN
     ******************************************************************/
    let stream = null;
    let posit = null;
    let animationId = null;
    let frameCounter = 0;

    let lastMarkers = [];
    let referenceMarkerId = null;

    const detector = new AR.Detector({
      dictionaryName: "ARUCO"
    });

    /******************************************************************
     * 4) HILFSFUNKTIONEN
     ******************************************************************/
    function getMarkerArea(marker) {
      const corners = marker.corners;
      let area = 0;

      for (let i = 0; i < corners.length; i++) {
        const j = (i + 1) % corners.length;
        area += corners[i].x * corners[j].y;
        area -= corners[j].x * corners[i].y;
      }

      return Math.abs(area / 2);
    }

    function getMarkerCenter(marker) {
      let x = 0;
      let y = 0;
      for (const c of marker.corners) {
        x += c.x;
        y += c.y;
      }
      return {
        x: x / marker.corners.length,
        y: y / marker.corners.length
      };
    }

    function getMarkerPixelSize(marker) {
      const c = marker.corners;

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      const d1 = dist(c[0], c[1]);
      const d2 = dist(c[1], c[2]);
      const d3 = dist(c[2], c[3]);
      const d4 = dist(c[3], c[0]);

      return (d1 + d2 + d3 + d4) / 4;
    }

    function dedupeMarkersByLargestArea(markers) {
      const bestById = new Map();

      for (const marker of markers) {
        const area = getMarkerArea(marker);
        const existing = bestById.get(marker.id);

        if (!existing || area > existing.area) {
          bestById.set(marker.id, { marker, area });
        }
      }

      return Array.from(bestById.values()).map(entry => entry.marker);
    }

    function chooseReferenceMarker(markers) {
      if (!markers.length) return null;

      // Wenn bisheriger Referenzmarker noch sichtbar ist -> behalten
      if (referenceMarkerId !== null) {
        const sameMarker = markers.find(m => m.id === referenceMarkerId);
        if (sameMarker) return sameMarker;
      }

      // Sonst größten Marker nehmen
      const biggest = [...markers].sort((a, b) => getMarkerArea(b) - getMarkerArea(a))[0];
      referenceMarkerId = biggest.id;
      return biggest;
    }

    /******************************************************************
     * 5) POSIT-VORBEREITUNG
     ******************************************************************/
    function convertCornersForPosit(corners) {
      return corners.map(corner => ({
        x: corner.x - canvas.width / 2,
        y: canvas.height / 2 - corner.y
      }));
    }

    function estimateMarkerPose(marker) {
      if (!posit) return null;

      const positCorners = convertCornersForPosit(marker.corners);
      const pose = posit.pose(positCorners);

      if (!pose || !pose.bestTranslation || !pose.bestRotation) {
        return null;
      }

      return {
        id: marker.id,
        translation: pose.bestTranslation,
        rotation: pose.bestRotation
      };
    }

    /******************************************************************
     * 6) 3D-PUNKT INS BILD PROJIZIEREN
     * ---------------------------------------------------------------
     * Nur für die Achsenanzeige am Marker
     ******************************************************************/
    function projectPoint(rotation, translation, point3D) {
      const X =
        rotation[0][0] * point3D.x +
        rotation[0][1] * point3D.y +
        rotation[0][2] * point3D.z +
        translation[0];

      const Y =
        rotation[1][0] * point3D.x +
        rotation[1][1] * point3D.y +
        rotation[1][2] * point3D.z +
        translation[1];

      const Z =
        rotation[2][0] * point3D.x +
        rotation[2][1] * point3D.y +
        rotation[2][2] * point3D.z +
        translation[2];

      const focal = canvas.width;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      return {
        x: cx + (focal * X / Z),
        y: cy - (focal * Y / Z)
      };
    }

    function drawAxes(rotation, translation) {
      const origin = projectPoint(rotation, translation, { x: 0, y: 0, z: 0 });
      const xAxis = projectPoint(rotation, translation, { x: AXIS_LENGTH_METERS, y: 0, z: 0 });
      const yAxis = projectPoint(rotation, translation, { x: 0, y: AXIS_LENGTH_METERS, z: 0 });
      const zAxis = projectPoint(rotation, translation, { x: 0, y: 0, z: AXIS_LENGTH_METERS });

      // X = rot
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(xAxis.x, xAxis.y);
      ctx.strokeStyle = "red";
      ctx.lineWidth = 4;
      ctx.stroke();

      // Y = grün
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(yAxis.x, yAxis.y);
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 4;
      ctx.stroke();

      // Z = blau
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(zAxis.x, zAxis.y);
      ctx.strokeStyle = "blue";
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    /******************************************************************
     * 7) OVERLAY ZEICHNEN
     ******************************************************************/
    function drawMarkers(markers, refId) {
      for (const marker of markers) {
        const corners = marker.corners;
        const isRef = marker.id === refId;

        ctx.strokeStyle = isRef ? "#00ffff" : "#00ff00";
        ctx.lineWidth = isRef ? 5 : 3;

        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);

        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }

        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = isRef ? "#00ffff" : "#00ff00";
        ctx.beginPath();
        ctx.arc(corners[0].x, corners[0].y, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ff0000";
        ctx.font = "20px Arial";
        ctx.fillText(
          isRef ? `REF ID: ${marker.id}` : `ID: ${marker.id}`,
          corners[0].x,
          corners[0].y - 10
        );
      }
    }

    function drawInfo(refMarker, estDistance) {
      ctx.fillStyle = "yellow";
      ctx.font = "20px Arial";

      ctx.fillText(`Ref ID: ${refMarker ? refMarker.id : "-"}`, 10, 30);
      ctx.fillText(`Distanz: ${estDistance ? estDistance.toFixed(2) : "-"} m`, 10, 60);

      if (refMarker) {
        const center = getMarkerCenter(refMarker);
        ctx.fillText(`Center X: ${center.x.toFixed(0)} px`, 10, 90);
        ctx.fillText(`Center Y: ${center.y.toFixed(0)} px`, 10, 120);
      }
    }

    /******************************************************************
     * 8) KAMERA START / STOP
     ******************************************************************/
    async function startCamera() {
      try {
        statusEl.textContent = "Status: Kamera wird gestartet...";

        if (stream) {
          const tracks = stream.getTracks();
          tracks.forEach(track => track.stop());
          stream = null;
        }

        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        referenceMarkerId = null;
        statusEl.textContent = "Status: Kamera läuft";
        renderFrame();

      } catch (error) {
        console.error("Fehler beim Starten der Kamera:", error);
        statusEl.textContent = "Status: Kamerafehler";
      }
    }

    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      referenceMarkerId = null;
      statusEl.textContent = "Status: Kamera gestoppt";
    }

    /******************************************************************
     * 9) RENDER LOOP
     ******************************************************************/
    function renderFrame() {
      if (video.readyState >= 2) {
        // feste, stabile Arbeitsauflösung
        if (canvas.width !== 640 || canvas.height !== 480) {
          canvas.width = 640;
          canvas.height = 480;
          posit = new POS.Posit(MARKER_SIZE, canvas.width);
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frameCounter++;

        if (frameCounter % DETECTION_EVERY_N_FRAMES === 0) {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const detectedMarkers = detector.detect(imageData);

          const markers = dedupeMarkersByLargestArea(detectedMarkers);
          const refMarker = chooseReferenceMarker(markers);

          lastMarkers = markers;

          drawMarkers(markers, refMarker ? refMarker.id : null);

          let estDistance = null;

          if (refMarker) {
            const pose = estimateMarkerPose(refMarker);
            if (pose) {
              drawAxes(pose.rotation, pose.translation);
            }

            const pixelSize = getMarkerPixelSize(refMarker);
            if (pixelSize > 1) {
              estDistance = clamp(
                (FOCAL_LENGTH_PX * MARKER_SIZE) / pixelSize,
                MIN_DISTANCE,
                MAX_DISTANCE
              );
            }

            statusEl.textContent =
              `Status: Kamera läuft – ${markers.length} Marker – Referenz ${refMarker.id}`;
          } else {
            statusEl.textContent = "Status: Kamera läuft – kein Marker erkannt";
          }

          drawInfo(refMarker, estDistance);
        } else {
          const refMarker = lastMarkers.find(m => m.id === referenceMarkerId) || null;
          drawMarkers(lastMarkers, refMarker ? refMarker.id : null);
        }
      }

      animationId = requestAnimationFrame(renderFrame);
    }

    /******************************************************************
     * 10) BUTTONS
     ******************************************************************/
    startCameraBtn.addEventListener("click", startCamera);
    stopCameraBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
