<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AruCo Phone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .video-wrapper {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: black;
      display: block;
    }

    video {
      display: none;
    }
  </style>
</head>
<body>
  <h1>iPhone Sender</h1>

  <div class="panel">
    <p>
      Diese Seite erkennt ArUco-Marker, zeichnet ihre Achsen ins Bild
      und berechnet daraus die Kameraposition relativ zur festen Marker-Wand.
    </p>

    <div class="button-row">
      <button id="startCameraBtn">Kamera starten</button>
      <button id="stopCameraBtn">Kamera stoppen</button>
    </div>

    <p id="status">Status: bereit</p>
    <p class="small">
      Die Werte oben links sind Kamerawerte.  
      Direkt am Marker werden nur Rahmen, ID und die X/Y/Z-Achsen angezeigt.
    </p>

    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <!-- js-aruco2 -->
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/posit1.js"></script>

  <script>
    /******************************************************************
     * 1) EINSTELLBARE PARAMETER
     ******************************************************************/

    // Reale Markergröße in Metern
    const MARKER_SIZE = 0.10; // 10 cm

    // Abstand der Marker-MITTELPUNKTE in Metern
    const MARKER_SPACING_X = 0.80; // 80 cm
    const MARKER_SPACING_Y = 0.60; // 60 cm

    // WSS-Adresse deines WebSocket-Servers
    const WS_URL = "wss://scaling-chainsaw-x5g5r9gj575pfppwq-8080.app.github.dev/";

    /*
      Kalibrierfaktor:
      Die POSIT-Translation wird hier in Meter für den Viewer übersetzt.
      Mit 0.01 bedeutet:
      100 Roh-Einheiten ≈ 1 Meter

      Falls dein Ausdruck oder deine Kamera später leicht anders reagiert,
      kannst du DIESEN Wert feinjustieren.
    */
    const TRANSLATION_TO_METERS = 0.01;

    /*
      Achsenlänge für die Darstellung direkt am Marker im Kamerabild.
      Das ist rein visuell.
    */
    const AXIS_LENGTH_METERS = 0.06; // 6 cm

    /*
      Nur diese IDs gelten als feste Weltmarker.
    */
    const VALID_IDS = new Set([0, 1, 2, 3]);

    /******************************************************************
     * 2) FESTE WELTPOSITIONEN DER 4 MARKER
     * ---------------------------------------------------------------
     * Wandkoordinatensystem:
     * - x = links/rechts entlang der Wand
     * - y = Höhe
     * - z = Abstand von der Wand in den Raum
     *
     * Wand selbst liegt bei z = 0
     *
     * Die Markerpositionen sind die MITTELPUNKTE der Marker.
     ******************************************************************/
    const WORLD_MARKERS = {
      0: { x: 0.0,              y: MARKER_SPACING_Y, z: 0.0 }, // oben links
      1: { x: MARKER_SPACING_X, y: MARKER_SPACING_Y, z: 0.0 }, // oben rechts
      2: { x: 0.0,              y: 0.0,              z: 0.0 }, // unten links
      3: { x: MARKER_SPACING_X, y: 0.0,              z: 0.0 }  // unten rechts
    };

    /******************************************************************
     * 3) HTML-ELEMENTE
     ******************************************************************/
    const startCameraBtn = document.getElementById("startCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    /******************************************************************
     * 4) GLOBALE VARIABLEN
     ******************************************************************/
    let stream = null;
    let animationId = null;
    let posit = null;
    let ws = null;

    const detector = new AR.Detector({
      dictionaryName: "ARUCO"
    });

    /******************************************************************
     * 5) WEBSOCKET
     ******************************************************************/
    function connectSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log("WebSocket verbunden");
      };

      ws.onerror = (err) => {
        console.error("WebSocket Fehler:", err);
      };

      ws.onclose = () => {
        console.log("WebSocket getrennt");
      };
    }

    /******************************************************************
     * 6) MARKER FÜR POSIT VORBEREITEN
     * ---------------------------------------------------------------
     * POSIT erwartet Marker-Ecken relativ zum Bildzentrum.
     ******************************************************************/
    function convertCornersForPosit(corners) {
      return corners.map(corner => ({
        x: corner.x - canvas.width / 2,
        y: canvas.height / 2 - corner.y
      }));
    }

    /******************************************************************
     * 7) PROJEKTION: 3D-PUNKT -> 2D BILDPUNKT
     * ---------------------------------------------------------------
     * Damit zeichnen wir die X/Y/Z-Achsen direkt auf den Marker.
     *
     * rotation = 3x3 Rotationsmatrix
     * translation = [tx, ty, tz]
     * point3D = Punkt im lokalen Marker-Koordinatensystem
     ******************************************************************/
    function projectPoint(rotation, translation, point3D) {
      const X =
        rotation[0][0] * point3D.x +
        rotation[0][1] * point3D.y +
        rotation[0][2] * point3D.z +
        translation[0];

      const Y =
        rotation[1][0] * point3D.x +
        rotation[1][1] * point3D.y +
        rotation[1][2] * point3D.z +
        translation[1];

      const Z =
        rotation[2][0] * point3D.x +
        rotation[2][1] * point3D.y +
        rotation[2][2] * point3D.z +
        translation[2];

      // Einfache Pinhole-Projektion
      const focal = canvas.width;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      return {
        x: cx + (focal * X / Z),
        y: cy - (focal * Y / Z)
      };
    }

    /******************************************************************
     * 8) ACHSEN AUF DEN MARKER ZEICHNEN
     * ---------------------------------------------------------------
     * X = rot
     * Y = grün
     * Z = blau
     ******************************************************************/
    function drawAxes(rotation, translation) {
      const origin = projectPoint(rotation, translation, { x: 0, y: 0, z: 0 });
      const xAxis = projectPoint(rotation, translation, { x: AXIS_LENGTH_METERS, y: 0, z: 0 });
      const yAxis = projectPoint(rotation, translation, { x: 0, y: AXIS_LENGTH_METERS, z: 0 });
      const zAxis = projectPoint(rotation, translation, { x: 0, y: 0, z: AXIS_LENGTH_METERS });

      // X-Achse (rot)
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(xAxis.x, xAxis.y);
      ctx.strokeStyle = "red";
      ctx.lineWidth = 4;
      ctx.stroke();

      // Y-Achse (grün)
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(yAxis.x, yAxis.y);
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 4;
      ctx.stroke();

      // Z-Achse (blau)
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(zAxis.x, zAxis.y);
      ctx.strokeStyle = "blue";
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    /******************************************************************
     * 9) MARKER ZEICHNEN
     ******************************************************************/
    function drawMarkers(markers) {
      for (const marker of markers) {
        const corners = marker.corners;

        // Rahmen
        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);

        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }

        ctx.closePath();
        ctx.stroke();

        // Ecke 0 markieren
        ctx.fillStyle = "#00ff00";
        ctx.beginPath();
        ctx.arc(corners[0].x, corners[0].y, 5, 0, Math.PI * 2);
        ctx.fill();

        // ID schreiben
        ctx.fillStyle = "#ff0000";
        ctx.font = "20px Arial";
        ctx.fillText("ID: " + marker.id, corners[0].x, corners[0].y - 10);
      }
    }

    /******************************************************************
     * 10) KAMERAWERTE LINKS OBEN ZEICHNEN
     ******************************************************************/
    function drawCameraPoseText(cameraPose, visibleCount) {
      ctx.fillStyle = "yellow";
      ctx.font = "20px Arial";

      ctx.fillText(`Cam X: ${cameraPose.x.toFixed(2)} m`, 10, 30);
      ctx.fillText(`Cam Y: ${cameraPose.y.toFixed(2)} m`, 10, 60);
      ctx.fillText(`Cam Z: ${cameraPose.z.toFixed(2)} m`, 10, 90);
      ctx.fillText(`Sichtbare Marker: ${visibleCount}`, 10, 120);
    }

    /******************************************************************
     * 11) POSE EINES EINZELNEN MARKERS BERECHNEN
     ******************************************************************/
    function estimateMarkerPose(marker) {
      if (!posit) return null;

      const positCorners = convertCornersForPosit(marker.corners);
      const pose = posit.pose(positCorners);

      if (!pose || !pose.bestTranslation || !pose.bestRotation) {
        return null;
      }

      return {
        id: marker.id,
        translation: pose.bestTranslation,
        rotation: pose.bestRotation
      };
    }

    /******************************************************************
     * 12) AUS MARKERPOSE -> KAMERAPOSE IN WELTKOORDINATEN
     * ---------------------------------------------------------------
     * translation = Marker relativ zur Kamera
     * rotation    = Marker-Rotation relativ zur Kamera
     *
     * Kamera relativ zum Marker:
     *   C_marker = - R^T * t
     *
     * Da alle Marker an der Wand gleich orientiert hängen,
     * können wir diese lokale Kameraposition auf die feste
     * Weltposition des jeweiligen Markers verschieben.
     ******************************************************************/
    function markerPoseToWorldCameraPose(markerPose) {
      const markerWorld = WORLD_MARKERS[markerPose.id];
      if (!markerWorld) return null;

      const R = markerPose.rotation;
      const t = markerPose.translation;

      // R^T * t berechnen
      const rt0 = R[0][0] * t[0] + R[1][0] * t[1] + R[2][0] * t[2];
      const rt1 = R[0][1] * t[0] + R[1][1] * t[1] + R[2][1] * t[2];
      const rt2 = R[0][2] * t[0] + R[1][2] * t[1] + R[2][2] * t[2];

      // Kamera relativ zum Marker
      const camRelMarker = {
        x: -rt0 * TRANSLATION_TO_METERS,
        y: -rt1 * TRANSLATION_TO_METERS,
        z: -rt2 * TRANSLATION_TO_METERS
      };

      /*
        Weltannahme:
        - Marker liegen alle auf derselben Wand
        - Markerorientierung ist gleich
        - Markerweltposition ist ihr Mittelpunkt

        Daraus:
        Kamera Welt = Marker Welt + Kamera relativ zu diesem Marker
      */
      return {
        x: markerWorld.x + camRelMarker.x,
        y: markerWorld.y + camRelMarker.y,
        z: markerWorld.z + camRelMarker.z
      };
    }

    /******************************************************************
     * 13) MITTELWERT AUS MEHREREN SICHTBAREN MARKERN BILDEN
     ******************************************************************/
    function averageCameraPoses(cameraPoses) {
      if (!cameraPoses || cameraPoses.length === 0) return null;

      let sumX = 0;
      let sumY = 0;
      let sumZ = 0;

      for (const pose of cameraPoses) {
        sumX += pose.x;
        sumY += pose.y;
        sumZ += pose.z;
      }

      return {
        x: sumX / cameraPoses.length,
        y: sumY / cameraPoses.length,
        z: sumZ / cameraPoses.length
      };
    }

    /******************************************************************
     * 14) AN VIEWER SENDEN
     * ---------------------------------------------------------------
     * Yaw/Pitch/Roll lassen wir hier noch bewusst 0.
     * Der nächste Schritt wäre dann die Blickrichtung sauber
     * aus der Rotationsmatrix abzuleiten.
     ******************************************************************/
    function sendCameraPoseToViewer(cameraPose) {
      if (!ws || ws.readyState !== WebSocket.OPEN || !cameraPose) {
        return;
      }

      ws.send(JSON.stringify({
        type: "pose",
        data: {
          x: cameraPose.x,
          y: cameraPose.y,
          z: Math.max(0.10, cameraPose.z), // nicht hinter die Wand
          yaw: 0,
          pitch: 0,
          roll: 0
        }
      }));
    }

    /******************************************************************
     * 15) EIN FRAME VERARBEITEN
     ******************************************************************/
    function renderFrame() {
      if (video.readyState >= 2) {
        // Canvas an echte Videoauflösung anpassen
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          // POSIT initialisieren, sobald die Breite bekannt ist
          posit = new POS.Posit(MARKER_SIZE, canvas.width);
        }

        // Kamerabild zeichnen
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Bilddaten holen
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // Marker erkennen
        const detectedMarkers = detector.detect(imageData);

        // Nur IDs 0-3 verwenden
        const validMarkers = detectedMarkers.filter(marker => VALID_IDS.has(marker.id));

        // Markerrahmen + IDs
        drawMarkers(validMarkers);

        // Für alle sichtbaren Marker Pose berechnen
        const worldCameraPoses = [];

        for (const marker of validMarkers) {
          const markerPose = estimateMarkerPose(marker);

          if (!markerPose) continue;

          // Achsen direkt am Marker zeichnen
          drawAxes(markerPose.rotation, markerPose.translation);

          // Kamerapose in Weltkoordinaten aus diesem Marker berechnen
          const worldCameraPose = markerPoseToWorldCameraPose(markerPose);

          if (worldCameraPose) {
            worldCameraPoses.push(worldCameraPose);
          }
        }

        // Wenn mindestens ein Marker eine brauchbare Weltkamera liefert:
        const averagedCameraPose = averageCameraPoses(worldCameraPoses);

        if (averagedCameraPose) {
          drawCameraPoseText(averagedCameraPose, worldCameraPoses.length);
          sendCameraPoseToViewer(averagedCameraPose);

          statusEl.textContent =
            `Status: Kamera läuft – ${validMarkers.length} gültige Marker – Weltpose aktiv`;
        } else {
          statusEl.textContent =
            `Status: Kamera läuft – ${validMarkers.length} gültige Marker`;
        }
      }

      animationId = requestAnimationFrame(renderFrame);
    }

    /******************************************************************
     * 16) KAMERA STARTEN
     ******************************************************************/
    async function startCamera() {
      try {
        statusEl.textContent = "Status: Kamera wird gestartet...";

        if (!ws || ws.readyState > 1) {
          connectSocket();
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        statusEl.textContent = "Status: Kamera läuft";
        renderFrame();

      } catch (error) {
        console.error("Fehler beim Starten der Kamera:", error);
        statusEl.textContent = "Status: Kamerafehler";
      }
    }

    /******************************************************************
     * 17) KAMERA STOPPEN
     ******************************************************************/
    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      statusEl.textContent = "Status: Kamera gestoppt";
    }

    /******************************************************************
     * 18) BUTTONS
     ******************************************************************/
    startCameraBtn.addEventListener("click", startCamera);
    stopCameraBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
