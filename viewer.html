<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AruCo Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Laptop / Beamer Viewer</h1>

  <div class="layout">
    <div class="panel">
      <h2>Live-Werte</h2>
      <p>X: <span id="x">0.00</span></p>
      <p>Y: <span id="y">0.00</span></p>
      <p>Z: <span id="z">0.00</span></p>
      <p>Yaw: <span id="yaw">0.00</span></p>
      <p>Pitch: <span id="pitch">0.00</span></p>
      <p>Roll: <span id="roll">0.00</span></p>
      <p>Status: <span id="status">verbinde...</span></p>
    </div>

    <div class="panel">
      <h2>Top-Down Ansicht</h2>
      <canvas id="map" width="600" height="350"></canvas>
    </div>
  </div>

  <script>
    const WS_URL = "wss://scaling-chainsaw-x5g5r9gj575pfppwq-8080.app.github.dev/"; //Hier kommt dann immer die Aktuelle Adresse rein mit Wss anstatt https und den Port auf Public stellen damit alls funkt

    const xEl = document.getElementById("x");
    const yEl = document.getElementById("y");
    const zEl = document.getElementById("z");
    const yawEl = document.getElementById("yaw");
    const pitchEl = document.getElementById("pitch");
    const rollEl = document.getElementById("roll");
    const statusEl = document.getElementById("status");

    const canvas = document.getElementById("map");
    const ctx = canvas.getContext("2d");

    let pose = {
      x: 0,
      y: 0,
      z: 0,
      yaw: 0,
      pitch: 0,
      roll: 0
    };

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Wand / Board links
      ctx.fillStyle = "#777";
      ctx.fillRect(60, 120, 25, 100);
      ctx.fillStyle = "#222";
      ctx.font = "16px Arial";
      ctx.fillText("Board", 45, 110);

      // Koordinatensystem grob
      ctx.strokeStyle = "#ddd";
      ctx.beginPath();
      ctx.moveTo(100, 175);
      ctx.lineTo(560, 175);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(100, 40);
      ctx.lineTo(100, 310);
      ctx.stroke();

      // Kamera-Position
      const camX = 180 + pose.x * 80;
      const camY = 175 + pose.z * 80;

      ctx.beginPath();
      ctx.arc(camX, camY, 10, 0, Math.PI * 2);
      ctx.fillStyle = "#1f6feb";
      ctx.fill();

      // Blickrichtung
      const len = 35;
      ctx.beginPath();
      ctx.moveTo(camX, camY);
      ctx.lineTo(
        camX + Math.cos(pose.yaw) * len,
        camY + Math.sin(pose.yaw) * len
      );
      ctx.strokeStyle = "#1f6feb";
      ctx.lineWidth = 3;
      ctx.stroke();

      requestAnimationFrame(drawScene);
    }

    drawScene();

    const ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusEl.textContent = "verbunden";
    };

    ws.onerror = () => {
      statusEl.textContent = "Fehler";
    };

    ws.onclose = () => {
      statusEl.textContent = "getrennt";
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === "pose") {
        pose = msg.data;

        xEl.textContent = pose.x.toFixed(2);
        yEl.textContent = pose.y.toFixed(2);
        zEl.textContent = pose.z.toFixed(2);
        yawEl.textContent = pose.yaw.toFixed(2);
        pitchEl.textContent = pose.pitch.toFixed(2);
        rollEl.textContent = pose.roll.toFixed(2);
      }
    };
  </script>
</body>
</html>
