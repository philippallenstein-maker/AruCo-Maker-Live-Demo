<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AruCo Phone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .video-wrapper {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: black;
    }

    /* Video bleibt technisch da, wird aber nicht angezeigt */
    video {
      display: none;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>iPhone Sender</h1>

  <div class="panel">
    <p>
      In diesem Schritt erkennen wir Marker im Kamerabild
      und zeichnen ihre IDs direkt ins Bild.
    </p>

    <div class="button-row">
      <button id="startCameraBtn">Kamera starten</button>
      <button id="stopCameraBtn">Kamera stoppen</button>
    </div>

    <p id="status">Status: bereit</p>
    <p class="small">
      Ziel dieses Schritts: Marker erkennen und ihre IDs im Bild anzeigen.
    </p>

    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <!--
    js-aruco2 Dateien direkt per CDN laden.
    Wir laden die einzelnen Quelldateien in der Reihenfolge,
    die die Library typischerweise braucht.
  -->
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/posit1.js"></script>

  <script>
    /******************************************************************
     * 1) HTML-ELEMENTE HOLEN
     ******************************************************************/
    const startCameraBtn = document.getElementById("startCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    /******************************************************************
     * 2) STREAM UND DETECTOR
     * ---------------------------------------------------------------
     * stream   = laufender Kamerastream
     * detector = ArUco-Detektor
     *
     * Wir nehmen hier bewusst das Dictionary "ARUCO",
     * weil das die schnelle Browser-Variante ist.
     ******************************************************************/
    let stream = null;
    let animationId = null;

    const detector = new AR.Detector({
      dictionaryName: "ARUCO"
    });

    /******************************************************************
     * 3) MARKER ZEICHNEN
     * ---------------------------------------------------------------
     * Diese Funktion zeichnet:
     * - den Marker-Rahmen
     * - die ID
     ******************************************************************/
    function drawMarkers(markers) {
      for (const marker of markers) {
        const corners = marker.corners;

        // Rahmen zeichnen
        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);

        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }

        ctx.closePath();
        ctx.stroke();

        // Marker-ID oberhalb der ersten Ecke anzeigen
        ctx.fillStyle = "#ff0000";
        ctx.font = "20px Arial";
        ctx.fillText("ID: " + marker.id, corners[0].x, corners[0].y - 10);
      }
    }

    /******************************************************************
     * 4) RENDER-SCHLEIFE
     * ---------------------------------------------------------------
     * Pro Frame:
     * - Videobild ins Canvas zeichnen
     * - Bilddaten lesen
     * - Marker erkennen
     * - Marker ins Bild einzeichnen
     ******************************************************************/
    function renderFrame() {
      if (video.readyState >= 2) {
        // Canvas an echte Videoauflösung anpassen
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }

        // Video ins Canvas zeichnen
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Bilddaten holen
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        // Marker erkennen
        const markers = detector.detect(imageData);

        // Marker ins Bild malen
        drawMarkers(markers);

        // Status anzeigen
        statusEl.textContent = `Status: Kamera läuft – ${markers.length} Marker erkannt`;
      }

      animationId = requestAnimationFrame(renderFrame);
    }

    /******************************************************************
     * 5) KAMERA STARTEN
     ******************************************************************/
    async function startCamera() {
      try {
        statusEl.textContent = "Status: Kamera wird gestartet...";

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        statusEl.textContent = "Status: Kamera läuft";
        renderFrame();

      } catch (error) {
        console.error("Fehler beim Starten der Kamera:", error);
        statusEl.textContent = "Status: Kamerafehler";
      }
    }

    /******************************************************************
     * 6) KAMERA STOPPEN
     ******************************************************************/
    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      statusEl.textContent = "Status: Kamera gestoppt";
    }

    /******************************************************************
     * 7) BUTTONS
     ******************************************************************/
    startCameraBtn.addEventListener("click", startCamera);
    stopCameraBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
