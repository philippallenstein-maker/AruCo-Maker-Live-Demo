<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AruCo Phone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .video-wrapper {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: black;
      display: block;
    }

    video {
      display: none;
    }
  </style>
</head>
<body>
  <h1>iPhone Sender</h1>

  <div class="panel">
    <p>
      Diese Version ist auf Stabilität optimiert:
      einfache Marker-Erkennung, Achsenanzeige und Viewer-Übertragung.
    </p>

    <div class="button-row">
      <button id="startCameraBtn">Kamera starten</button>
      <button id="stopCameraBtn">Kamera stoppen</button>
    </div>

    <p id="status">Status: bereit</p>
    <p class="small">
      Oben links stehen die Kamerawerte.  
      Am Marker selbst sieht man Rahmen, ID und die Achsen.
    </p>

    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/posit1.js"></script>

  <script>
    /******************************************************************
     * 1) EINSTELLUNGEN
     ******************************************************************/
    const MARKER_SIZE = 0.10;
    const WS_URL = "wss://scaling-chainsaw-x5g5r9gj575pfppwq-8080.app.github.dev/";

    // Viewer-Geometrie muss dazu passen
    const WORLD_MARKERS = {
      0: { x: 0.6, y: 1.5, z: 0.0 },
      1: { x: 1.4, y: 1.5, z: 0.0 },
      2: { x: 0.6, y: 0.9, z: 0.0 },
      3: { x: 1.4, y: 0.9, z: 0.0 }
    };

    const VALID_IDS = new Set([0, 1, 2, 3]);

    // Distanz-Schätzung
    const FOCAL_LENGTH_PX = 1600;

    // Bewegung im Raum
    const IMAGE_TO_WORLD_GAIN_X = 1.0;
    const IMAGE_TO_WORLD_GAIN_Y = 0.7;

    // Glättung
    const SMOOTH_ALPHA = 0.35;

    // Distanzgrenzen
    const MIN_DISTANCE = 0.25;
    const MAX_DISTANCE = 3.2;

    // Achsenlänge im Overlay
    const AXIS_LENGTH_METERS = 0.06;

    // Nur jedes 3. Frame rechnen -> deutlich weniger Last
    const DETECTION_EVERY_N_FRAMES = 3;

    /******************************************************************
     * 2) HTML
     ******************************************************************/
    const startCameraBtn = document.getElementById("startCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    /******************************************************************
     * 3) GLOBALE VARIABLEN
     ******************************************************************/
    let stream = null;
    let ws = null;
    let posit = null;
    let animationId = null;
    let frameCounter = 0;

    let lastMarkers = [];
    let lastPoseForViewer = null;

    const detector = new AR.Detector({
      dictionaryName: "ARUCO"
    });

    /******************************************************************
     * 4) WEBSOCKET
     ******************************************************************/
    function connectSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => console.log("WebSocket verbunden");
      ws.onerror = (err) => console.error("WebSocket Fehler:", err);
      ws.onclose = () => console.log("WebSocket getrennt");
    }

    /******************************************************************
     * 5) HILFSFUNKTIONEN
     ******************************************************************/
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smoothPose(oldPose, newPose) {
      if (!oldPose) return { ...newPose };

      return {
        x: lerp(oldPose.x, newPose.x, SMOOTH_ALPHA),
        y: lerp(oldPose.y, newPose.y, SMOOTH_ALPHA),
        z: lerp(oldPose.z, newPose.z, SMOOTH_ALPHA),
        yaw: 0,
        pitch: 0,
        roll: 0
      };
    }

    function getMarkerCenter(marker) {
      let x = 0;
      let y = 0;
      for (const c of marker.corners) {
        x += c.x;
        y += c.y;
      }
      return {
        x: x / marker.corners.length,
        y: y / marker.corners.length
      };
    }

    function getMarkerPixelSize(marker) {
      const c = marker.corners;

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      const d1 = dist(c[0], c[1]);
      const d2 = dist(c[1], c[2]);
      const d3 = dist(c[2], c[3]);
      const d4 = dist(c[3], c[0]);

      return (d1 + d2 + d3 + d4) / 4;
    }

    function getMarkerArea(marker) {
      const corners = marker.corners;
      let area = 0;

      for (let i = 0; i < corners.length; i++) {
        const j = (i + 1) % corners.length;
        area += corners[i].x * corners[j].y;
        area -= corners[j].x * corners[i].y;
      }

      return Math.abs(area / 2);
    }

    function dedupeMarkersByLargestArea(markers) {
      const bestById = new Map();

      for (const marker of markers) {
        if (!VALID_IDS.has(marker.id)) continue;

        const area = getMarkerArea(marker);
        const existing = bestById.get(marker.id);

        if (!existing || area > existing.area) {
          bestById.set(marker.id, { marker, area });
        }
      }

      return Array.from(bestById.values()).map(entry => entry.marker);
    }

    function takeLargestMarkers(markers, maxCount = 2) {
      return [...markers]
        .sort((a, b) => getMarkerArea(b) - getMarkerArea(a))
        .slice(0, maxCount);
    }

    /******************************************************************
     * 6) POSIT FÜR ACHSEN
     ******************************************************************/
    function convertCornersForPosit(corners) {
      return corners.map(corner => ({
        x: corner.x - canvas.width / 2,
        y: canvas.height / 2 - corner.y
      }));
    }

    function estimateMarkerPose(marker) {
      if (!posit) return null;

      const positCorners = convertCornersForPosit(marker.corners);
      const pose = posit.pose(positCorners);

      if (!pose || !pose.bestTranslation || !pose.bestRotation) {
        return null;
      }

      return {
        id: marker.id,
        translation: pose.bestTranslation,
        rotation: pose.bestRotation
      };
    }

    function projectPoint(rotation, translation, point3D) {
      const X =
        rotation[0][0] * point3D.x +
        rotation[0][1] * point3D.y +
        rotation[0][2] * point3D.z +
        translation[0];

      const Y =
        rotation[1][0] * point3D.x +
        rotation[1][1] * point3D.y +
        rotation[1][2] * point3D.z +
        translation[1];

      const Z =
        rotation[2][0] * point3D.x +
        rotation[2][1] * point3D.y +
        rotation[2][2] * point3D.z +
        translation[2];

      const focal = canvas.width;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      return {
        x: cx + (focal * X / Z),
        y: cy - (focal * Y / Z)
      };
    }

    function drawAxes(rotation, translation) {
      const origin = projectPoint(rotation, translation, { x: 0, y: 0, z: 0 });
      const xAxis = projectPoint(rotation, translation, { x: AXIS_LENGTH_METERS, y: 0, z: 0 });
      const yAxis = projectPoint(rotation, translation, { x: 0, y: AXIS_LENGTH_METERS, z: 0 });
      const zAxis = projectPoint(rotation, translation, { x: 0, y: 0, z: AXIS_LENGTH_METERS });

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(xAxis.x, xAxis.y);
      ctx.strokeStyle = "red";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(yAxis.x, yAxis.y);
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(zAxis.x, zAxis.y);
      ctx.strokeStyle = "blue";
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    /******************************************************************
     * 7) OVERLAY ZEICHNEN
     ******************************************************************/
    function drawMarkers(markers) {
      for (const marker of markers) {
        const corners = marker.corners;

        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);

        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }

        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = "#00ff00";
        ctx.beginPath();
        ctx.arc(corners[0].x, corners[0].y, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ff0000";
        ctx.font = "20px Arial";
        ctx.fillText("ID: " + marker.id, corners[0].x, corners[0].y - 10);
      }
    }

    function drawCameraPoseText(cameraPose, visibleCount, estDistance) {
      ctx.fillStyle = "yellow";
      ctx.font = "20px Arial";
      ctx.fillText(`Cam X: ${cameraPose.x.toFixed(2)} m`, 10, 30);
      ctx.fillText(`Cam Y: ${cameraPose.y.toFixed(2)} m`, 10, 60);
      ctx.fillText(`Cam Z: ${cameraPose.z.toFixed(2)} m`, 10, 90);
      ctx.fillText(`Marker: ${visibleCount}`, 10, 120);
      ctx.fillText(`Dist: ${estDistance.toFixed(2)} m`, 10, 150);
    }

    /******************************************************************
     * 8) EINFACHE STABILE DEMO-POSITION
     ******************************************************************/
    function estimateCameraPoseFromVisibleMarkers(markers) {
      if (!markers || markers.length === 0) return null;

      let totalWeight = 0;
      let sumWorldX = 0;
      let sumWorldY = 0;
      let sumImgX = 0;
      let sumImgY = 0;
      let sumDist = 0;

      for (const marker of markers) {
        const world = WORLD_MARKERS[marker.id];
        if (!world) continue;

        const center = getMarkerCenter(marker);
        const pixelSize = getMarkerPixelSize(marker);
        const area = getMarkerArea(marker);
        const weight = Math.max(1, area);

        sumWorldX += world.x * weight;
        sumWorldY += world.y * weight;
        sumImgX += center.x * weight;
        sumImgY += center.y * weight;

        if (pixelSize > 1) {
          const distance = (FOCAL_LENGTH_PX * MARKER_SIZE) / pixelSize;
          sumDist += distance * weight;
        }

        totalWeight += weight;
      }

      if (totalWeight <= 0) return null;

      const anchorX = sumWorldX / totalWeight;
      const anchorY = sumWorldY / totalWeight;
      const imgCenterX = sumImgX / totalWeight;
      const imgCenterY = sumImgY / totalWeight;
      let distance = sumDist / totalWeight;

      distance = clamp(distance, MIN_DISTANCE, MAX_DISTANCE);

      const normX = (imgCenterX - canvas.width / 2) / (canvas.width / 2);
      const normY = (imgCenterY - canvas.height / 2) / (canvas.height / 2);

      const camX = anchorX + normX * distance * IMAGE_TO_WORLD_GAIN_X;
      const camY = anchorY + normY * distance * IMAGE_TO_WORLD_GAIN_Y;
      const camZ = distance;

      return {
        x: clamp(camX, 0.0, 2.0),
        y: clamp(camY, 0.0, 2.4),
        z: clamp(camZ, MIN_DISTANCE, MAX_DISTANCE),
        yaw: 0,
        pitch: 0,
        roll: 0,
        visibleCount: markers.length,
        estDistance: distance
      };
    }

    /******************************************************************
     * 9) AN VIEWER SENDEN
     ******************************************************************/
    function sendCameraPoseToViewer(cameraPose) {
      if (!ws || ws.readyState !== WebSocket.OPEN || !cameraPose) return;

      lastGoodPose = smoothPose(lastGoodPose, cameraPose);

      ws.send(JSON.stringify({
        type: "pose",
        data: {
          x: lastGoodPose.x,
          y: lastGoodPose.y,
          z: lastGoodPose.z,
          yaw: 0,
          pitch: 0,
          roll: 0
        }
      }));
    }

    /******************************************************************
     * 10) KAMERA START / STOP
     ******************************************************************/
    async function startCamera() {
      try {
        statusEl.textContent = "Status: Kamera wird gestartet...";

        if (!ws || ws.readyState > 1) {
          connectSocket();
        }

        if (stream) {
          const tracks = stream.getTracks();
          tracks.forEach(track => track.stop());
          stream = null;
        }

        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        lastGoodPose = null;
        statusEl.textContent = "Status: Kamera läuft";
        renderFrame();

      } catch (error) {
        console.error("Fehler beim Starten der Kamera:", error);
        statusEl.textContent = "Status: Kamerafehler";
      }
    }

    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      lastGoodPose = null;
      statusEl.textContent = "Status: Kamera gestoppt";
    }

    /******************************************************************
     * 11) RENDER LOOP
     ******************************************************************/
    function renderFrame() {
      if (video.readyState >= 2) {
        // Arbeitsauflösung begrenzen
        if (canvas.width !== 640 || canvas.height !== 480) {
          canvas.width = 640;
          canvas.height = 480;
          posit = new POS.Posit(MARKER_SIZE, canvas.width);
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        frameCounter++;

        // Erkennung nur alle N Frames
        if (frameCounter % DETECTION_EVERY_N_FRAMES === 0) {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const detectedMarkers = detector.detect(imageData);

          let validMarkers = dedupeMarkersByLargestArea(detectedMarkers);
          let poseMarkers = takeLargestMarkers(validMarkers, 2);

          lastMarkers = validMarkers;

          // Marker zeichnen
          drawMarkers(validMarkers);

          // Achsen nur für größten Marker
          if (poseMarkers.length > 0) {
            const pose = estimateMarkerPose(poseMarkers[0]);
            if (pose) {
              drawAxes(pose.rotation, pose.translation);
            }
          }

          // Pose nur aus den 2 größten
          const cameraPose = estimateCameraPoseFromVisibleMarkers(poseMarkers);

          if (cameraPose) {
            drawCameraPoseText(cameraPose, cameraPose.visibleCount, cameraPose.estDistance);
            sendCameraPoseToViewer(cameraPose);
            statusEl.textContent =
              `Status: Kamera läuft – ${validMarkers.length} gültige Marker`;
          } else {
            statusEl.textContent =
              `Status: Kamera läuft – keine stabile Pose`;
          }
        } else {
          // Zwischenframes: nur letztes Overlay grob weiterzeichnen
          drawMarkers(lastMarkers);
        }
      }

      animationId = requestAnimationFrame(renderFrame);
    }

    /******************************************************************
     * 12) BUTTONS
     ******************************************************************/
    startCameraBtn.addEventListener("click", startCamera);
    stopCameraBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
