<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AruCo Phone</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .video-wrapper {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: black;
      display: block;
    }

    video {
      display: none;
    }
  </style>
</head>
<body>
  <h1>iPhone Sender</h1>

  <div class="panel">
    <p>
      Diese Seite erkennt ArUco-Marker, zeichnet Achsen ein und berechnet
      eine stabile Demo-Kameraposition relativ zur Marker-Wand.
    </p>

    <div class="button-row">
      <button id="startCameraBtn">Kamera starten</button>
      <button id="stopCameraBtn">Kamera stoppen</button>
    </div>

    <p id="status">Status: bereit</p>
    <p class="small">
      Kamerawerte oben links. Am Marker selbst nur Rahmen, ID und X/Y/Z-Achsen.
    </p>

    <div class="video-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/posit1.js"></script>

  <script>
    /******************************************************************
     * 1) EINSTELLBARE PARAMETER
     ******************************************************************/
    const MARKER_SIZE = 0.10;      // 10 cm
    const MARKER_SPACING_X = 0.80; // 80 cm
    const MARKER_SPACING_Y = 0.60; // 60 cm
     const WS_URL = "wss://scaling-chainsaw-x5g5r9gj575pfppwq-8080.app.github.dev/";

    // Nur Z aus POSIT verwenden, in Meter umgerechnet
    const TRANSLATION_TO_METERS = 0.13;

    // Achsenlänge für Overlay
    const AXIS_LENGTH_METERS = 0.06;

    // Glättung für ruhige Bewegung
    const SMOOTHING = 0.65;

    // Wie stark Bildoffset die Raumbewegung beeinflusst
    const OFFSET_GAIN_X = 1.6;
    const OFFSET_GAIN_Y = 1.4;

    // Begrenzung der nutzbaren Distanz
    const MIN_DISTANCE = 0.30;
    const MAX_DISTANCE = 3.00;
    const VALID_IDS = new Set([0, 1, 2, 3]);

    /******************************************************************
     * 2) FESTE WELTPOSITIONEN DER MARKERMITTELPUNKTE
     ******************************************************************/
    const WORLD_MARKERS = {
  0: { x: 0.6, y: 1.5, z: 0.0 }, // oben links
  1: { x: 1.4, y: 1.5, z: 0.0 }, // oben rechts
  2: { x: 0.6, y: 0.9, z: 0.0 }, // unten links
  3: { x: 1.4, y: 0.9, z: 0.0 }  // unten rechts
};
    /******************************************************************
     * 3) HTML-ELEMENTE
     ******************************************************************/
    const startCameraBtn = document.getElementById("startCameraBtn");
    const stopCameraBtn = document.getElementById("stopCameraBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    /******************************************************************
     * 4) GLOBALE VARIABLEN
     ******************************************************************/
    let stream = null;
    let animationId = null;
    let posit = null;
    let ws = null;
    let smoothedPose = null;

    const detector = new AR.Detector({
      dictionaryName: "ARUCO"
    });

    /******************************************************************
     * 5) WEBSOCKET
     ******************************************************************/
    function connectSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => console.log("WebSocket verbunden");
      ws.onerror = (err) => console.error("WebSocket Fehler:", err);
      ws.onclose = () => console.log("WebSocket getrennt");
    }

    /******************************************************************
     * 6) HILFSFUNKTIONEN
     ******************************************************************/
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smoothPose(newPose) {
      if (!smoothedPose) {
        smoothedPose = { ...newPose };
        return smoothedPose;
      }

      const alpha = 1 - SMOOTHING;
      smoothedPose.x = lerp(smoothedPose.x, newPose.x, alpha);
      smoothedPose.y = lerp(smoothedPose.y, newPose.y, alpha);
      smoothedPose.z = lerp(smoothedPose.z, newPose.z, alpha);
      smoothedPose.yaw = lerp(smoothedPose.yaw, newPose.yaw, alpha);
      smoothedPose.pitch = lerp(smoothedPose.pitch, newPose.pitch, alpha);
      smoothedPose.roll = lerp(smoothedPose.roll, newPose.roll, alpha);
      return smoothedPose;
    }

    /******************************************************************
     * 7) POSIT-VORBEREITUNG
     ******************************************************************/
    function convertCornersForPosit(corners) {
      return corners.map(corner => ({
        x: corner.x - canvas.width / 2,
        y: canvas.height / 2 - corner.y
      }));
    }

    function estimateMarkerPose(marker) {
      if (!posit) return null;

      const positCorners = convertCornersForPosit(marker.corners);
      const pose = posit.pose(positCorners);

      if (!pose || !pose.bestTranslation || !pose.bestRotation) {
        return null;
      }

      return {
        id: marker.id,
        translation: pose.bestTranslation,
        rotation: pose.bestRotation
      };
    }

    /******************************************************************
     * 8) 3D-PUNKT INS BILD PROJIZIEREN
     * ---------------------------------------------------------------
     * Für die X/Y/Z-Achsen am Marker.
     ******************************************************************/
    function projectPoint(rotation, translation, point3D) {
      const X =
        rotation[0][0] * point3D.x +
        rotation[0][1] * point3D.y +
        rotation[0][2] * point3D.z +
        translation[0];

      const Y =
        rotation[1][0] * point3D.x +
        rotation[1][1] * point3D.y +
        rotation[1][2] * point3D.z +
        translation[1];

      const Z =
        rotation[2][0] * point3D.x +
        rotation[2][1] * point3D.y +
        rotation[2][2] * point3D.z +
        translation[2];

      const focal = canvas.width;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      return {
        x: cx + (focal * X / Z),
        y: cy - (focal * Y / Z)
      };
    }

    function drawAxes(rotation, translation) {
      const origin = projectPoint(rotation, translation, { x: 0, y: 0, z: 0 });
      const xAxis = projectPoint(rotation, translation, { x: AXIS_LENGTH_METERS, y: 0, z: 0 });
      const yAxis = projectPoint(rotation, translation, { x: 0, y: AXIS_LENGTH_METERS, z: 0 });
      const zAxis = projectPoint(rotation, translation, { x: 0, y: 0, z: AXIS_LENGTH_METERS });

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(xAxis.x, xAxis.y);
      ctx.strokeStyle = "red";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(yAxis.x, yAxis.y);
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(zAxis.x, zAxis.y);
      ctx.strokeStyle = "blue";
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    /******************************************************************
     * 9) MARKER ZEICHNEN
     ******************************************************************/
    function drawMarkers(markers) {
      for (const marker of markers) {
        const corners = marker.corners;

        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);

        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }

        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = "#00ff00";
        ctx.beginPath();
        ctx.arc(corners[0].x, corners[0].y, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ff0000";
        ctx.font = "20px Arial";
        ctx.fillText("ID: " + marker.id, corners[0].x, corners[0].y - 10);
      }
    }

    /******************************************************************
     * 10) KAMERAWERTE LINKS OBEN
     ******************************************************************/
    function drawCameraPoseText(cameraPose, visibleCount) {
      ctx.fillStyle = "yellow";
      ctx.font = "20px Arial";
      ctx.fillText(`Cam X: ${cameraPose.x.toFixed(2)} m`, 10, 30);
      ctx.fillText(`Cam Y: ${cameraPose.y.toFixed(2)} m`, 10, 60);
      ctx.fillText(`Cam Z: ${cameraPose.z.toFixed(2)} m`, 10, 90);
      ctx.fillText(`Marker: ${visibleCount}`, 10, 120);
    }

    /******************************************************************
     * 11) STABILE DEMO-WELTLOGIK
     * ---------------------------------------------------------------
     * Pro sichtbarem Marker:
     * - Weltanker = feste Position des Markers an der Wand
     * - Bildzentrum des Markers = links/rechts/oben/unten relativ dazu
     * - Distanz = nur aus POSIT-Z
     *
     * Mehrere Marker werden gemittelt.
     ******************************************************************/
    function estimateCameraFromMarker(marker, markerPose) {
      const anchor = WORLD_MARKERS[marker.id];
      if (!anchor || !markerPose) return null;

      // Markerzentrum im Bild
      let cx = 0;
      let cy = 0;
      for (const c of marker.corners) {
        cx += c.x;
        cy += c.y;
      }
      cx /= marker.corners.length;
      cy /= marker.corners.length;

      // Normierter Offset im Bild
      const normX = (cx - canvas.width / 2) / (canvas.width / 2);
      const normY = (cy - canvas.height / 2) / (canvas.height / 2);

      // Distanz nur aus translation[2]
      let distance = markerPose.translation[2] * TRANSLATION_TO_METERS;
      distance = clamp(distance, MIN_DISTANCE, MAX_DISTANCE);

      // Kamera relativ zum Markeranker
      // Marker links im Bild -> Kamera eher rechts vom Markeranker
      // Marker oben im Bild -> Kamera eher höher
      const camX = anchor.x - normX * distance * OFFSET_GAIN_X;
      const camY = anchor.y + normY * distance * OFFSET_GAIN_Y;
      const camZ = distance;

      return {
        x: clamp(camX, 0.0, 2.0),
        y: clamp(camY, 0.0, 2.4),
        z: clamp(camZ, MIN_DISTANCE, MAX_DISTANCE),
        yaw: 0,
        pitch: 0,
        roll: 0
      };
    }

    function averageCameraPoses(cameraPoses) {
      if (!cameraPoses || cameraPoses.length === 0) return null;

      let sumX = 0;
      let sumY = 0;
      let sumZ = 0;

      for (const pose of cameraPoses) {
        sumX += pose.x;
        sumY += pose.y;
        sumZ += pose.z;
      }

      return {
        x: sumX / cameraPoses.length,
        y: sumY / cameraPoses.length,
        z: sumZ / cameraPoses.length,
        yaw: 0,
        pitch: 0,
        roll: 0
      };
    }

    /******************************************************************
     * 12) AN VIEWER SENDEN
     ******************************************************************/
    function sendCameraPoseToViewer(cameraPose) {
      if (!ws || ws.readyState !== WebSocket.OPEN || !cameraPose) return;

      const stablePose = smoothPose(cameraPose);

      ws.send(JSON.stringify({
        type: "pose",
        data: stablePose
      }));
    }

    /******************************************************************
     * 13) FRAME-VERARBEITUNG
     ******************************************************************/
    function renderFrame() {
      if (video.readyState >= 2) {
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          posit = new POS.Posit(MARKER_SIZE, canvas.width);
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const detectedMarkers = detector.detect(imageData);
        const validMarkers = detectedMarkers.filter(marker => VALID_IDS.has(marker.id));

        drawMarkers(validMarkers);

        const cameraCandidates = [];

        for (const marker of validMarkers) {
          const markerPose = estimateMarkerPose(marker);
          if (!markerPose) continue;

          drawAxes(markerPose.rotation, markerPose.translation);

          const cameraPose = estimateCameraFromMarker(marker, markerPose);
          if (cameraPose) {
            cameraCandidates.push(cameraPose);
          }
        }

        const averagedCameraPose = averageCameraPoses(cameraCandidates);

        if (averagedCameraPose) {
          drawCameraPoseText(averagedCameraPose, cameraCandidates.length);
          sendCameraPoseToViewer(averagedCameraPose);
          statusEl.textContent =
            `Status: Kamera läuft – ${validMarkers.length} gültige Marker – stabile Demo-Pose aktiv`;
        } else {
          statusEl.textContent =
            `Status: Kamera läuft – ${validMarkers.length} gültige Marker`;
        }
      }

      animationId = requestAnimationFrame(renderFrame);
    }

    /******************************************************************
     * 14) KAMERA STARTEN / STOPPEN
     ******************************************************************/
    async function startCamera() {
      try {
        statusEl.textContent = "Status: Kamera wird gestartet...";

        if (!ws || ws.readyState > 1) {
          connectSocket();
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        statusEl.textContent = "Status: Kamera läuft";
        renderFrame();
      } catch (error) {
        console.error("Fehler beim Starten der Kamera:", error);
        statusEl.textContent = "Status: Kamerafehler";
      }
    }

    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      statusEl.textContent = "Status: Kamera gestoppt";
    }

    /******************************************************************
     * 15) BUTTONS
     ******************************************************************/
    startCameraBtn.addEventListener("click", startCamera);
    stopCameraBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
